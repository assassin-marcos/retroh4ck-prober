name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: retroh4ck-prober

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
            archive: tar.gz
            strip: true
            strip_cmd: strip

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
            archive: tar.gz
            strip: true
            strip_cmd: aarch64-linux-gnu-strip

          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
            archive: tar.gz
            strip: true
            strip_cmd: strip

          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
            archive: tar.gz
            strip: true
            strip_cmd: strip

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
            archive: zip
            strip: false
            strip_cmd: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable, native target)
        if: matrix.cross == false
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-release-${{ matrix.target }}-

      - name: Build (native)
        if: matrix.cross == false
        shell: bash
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross-compile via houseabsolute/actions-rust-cross)
        if: matrix.cross == true
        uses: houseabsolute/actions-rust-cross@v0
        with:
          command: build
          target: ${{ matrix.target }}
          args: "--release"

      - name: Install aarch64 cross-strip (Linux ARM only)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils-aarch64-linux-gnu

      - name: Strip binary (Linux + macOS)
        if: matrix.strip == true
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/${BINARY_NAME}"
          if [ -f "${BIN}" ]; then
            ${{ matrix.strip_cmd }} "${BIN}"
          else
            echo "Binary not found at ${BIN}" >&2
            exit 1
          fi

      - name: Stage release files (Linux + macOS)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          STAGE="${BINARY_NAME}-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "dist/${STAGE}"
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "dist/${STAGE}/"
          # README + LICENSE are optional at this point (other agent owns
          # them); copy if present, otherwise just ship the binary.
          [ -f README.md ] && cp README.md "dist/${STAGE}/" || true
          [ -f LICENSE ] && cp LICENSE "dist/${STAGE}/" || true
          [ -f CHANGELOG.md ] && cp CHANGELOG.md "dist/${STAGE}/" || true

      - name: Stage release files (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $stage = "${env:BINARY_NAME}-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist/$stage" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${env:BINARY_NAME}.exe" "dist/$stage/"
          if (Test-Path "README.md") { Copy-Item "README.md" "dist/$stage/" }
          if (Test-Path "LICENSE") { Copy-Item "LICENSE" "dist/$stage/" }
          if (Test-Path "CHANGELOG.md") { Copy-Item "CHANGELOG.md" "dist/$stage/" }

      - name: Create archive + sha256 (Linux + macOS)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          STAGE="${BINARY_NAME}-${{ github.ref_name }}-${{ matrix.target }}"
          cd dist
          tar -czf "${STAGE}.tar.gz" "${STAGE}"
          shasum -a 256 "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"
          ls -la "${STAGE}.tar.gz" "${STAGE}.tar.gz.sha256"

      - name: Create archive + sha256 (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $stage = "${env:BINARY_NAME}-${{ github.ref_name }}-${{ matrix.target }}"
          Push-Location dist
          Compress-Archive -Path $stage -DestinationPath "$stage.zip" -Force
          $hash = (Get-FileHash "$stage.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $stage.zip" | Out-File -Encoding ascii "$stage.zip.sha256"
          Get-ChildItem "$stage.zip", "$stage.zip.sha256"
          Pop-Location

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}
          path: |
            dist/${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive }}
            dist/${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive }}.sha256
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts into release-files/
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' \) \
            -exec cp -v {} release-files/ \;
          ls -la release-files/

      - name: Extract release notes from CHANGELOG.md (if present)
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          NOTES_FILE="release-notes.md"
          if [ -f CHANGELOG.md ]; then
            # Pull the section for this tag (## [vX.Y.Z] or ## vX.Y.Z) up to
            # the next "## " heading. If we can't find one, fall back to a
            # generic body that points at the tag.
            awk -v tag="${TAG}" '
              BEGIN { in_section = 0 }
              /^## / {
                if (in_section) { exit }
                if (index($0, tag) > 0) { in_section = 1; next }
              }
              in_section { print }
            ' CHANGELOG.md > "${NOTES_FILE}"
            if [ ! -s "${NOTES_FILE}" ]; then
              echo "Release ${TAG}. See CHANGELOG.md and commit history for details." > "${NOTES_FILE}"
            fi
          else
            echo "Release ${TAG}. See commit history for details." > "${NOTES_FILE}"
          fi
          echo "notes_file=${NOTES_FILE}" >> "${GITHUB_OUTPUT}"
          echo "--- release notes ---"
          cat "${NOTES_FILE}"

      - name: Create GitHub release and attach assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.notes_file }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            release-files/*.tar.gz
            release-files/*.zip
            release-files/*.sha256
